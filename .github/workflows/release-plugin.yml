name: Release Revit Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore revit_plugin_azure/RevitMCPBridge.sln

      - name: Build Solution
        run: dotnet build revit_plugin_azure/RevitMCPBridge.sln --configuration Release -p:Platform=x64 --no-restore

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile Installer
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$VERSION revit_plugin_azure/installer/installer.iss

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: revit_plugin_azure/installer/Output/RevitMCPBridge-Setup-*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
